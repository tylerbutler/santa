changesDir: .changes
unreleasedDir: unreleased
headerPath: header.md
changelogPath: CHANGELOG.md
versionHeaderPath: ""
versionFooterPath: ""
versionExt: md
envPrefix: CHANGIE

projectsVersionSeparator: "-"

projects:
    - label: Santa CLI
      key: santa
      changelog: crates/santa-cli/CHANGELOG.md
      replacements:
        - path: crates/santa-cli/Cargo.toml
          find: '^version = ".*"$'
          replace: 'version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'
    - label: Santa Data
      key: santa-data
      changelog: crates/santa-data/CHANGELOG.md
      replacements:
        - path: crates/santa-data/Cargo.toml
          find: '^version = ".*"$'
          replace: 'version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'
        # Keep dependents' version requirement in sync with the new release.
        - path: crates/santa-cli/Cargo.toml
          find: '^santa-data = \{ version = "[^"]*"'
          replace: 'santa-data = { version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'
    - label: Sickle
      key: sickle
      changelog: crates/sickle/CHANGELOG.md
      replacements:
        - path: crates/sickle/Cargo.toml
          find: '^version = ".*"$'
          replace: 'version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'
        # Keep dependents' version requirements in sync with the new release.
        - path: crates/santa-cli/Cargo.toml
          find: '^sickle = \{ version = "[^"]*"'
          replace: 'sickle = { version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'
        - path: crates/santa-data/Cargo.toml
          find: '^sickle = \{ version = "[^"]*"'
          replace: 'sickle = { version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'
    - label: Sickle CLI
      key: sickle-cli
      changelog: crates/sickle-cli/CHANGELOG.md
      replacements:
        - path: crates/sickle-cli/Cargo.toml
          find: '^version = ".*"$'
          replace: 'version = "{{.Major}}.{{.Minor}}.{{.Patch}}"'

versionFormat: '## {{.Version}} - {{.Time.Format "2006-01-02"}}'
kindFormat: '### {{.Kind}}'
changeFormat: '- {{.Body}}'

kinds:
    - label: Breaking
      auto: minor
    - label: Added
      auto: minor
    - label: Fixed
      auto: patch
    - label: Performance
      auto: patch
    - label: Changed
      auto: patch
    - label: Reverted
      auto: patch
    - label: Dependencies
      auto: patch
    - label: Security
      auto: patch

newlines:
    afterChangelogHeader: 1
    afterChangelogVersion: 1
    afterKind: 1
    afterVersion: 1
    beforeKind: 1
    endOfVersion: 1
