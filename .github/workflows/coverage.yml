name: Code Coverage

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  coverage:
    # This job serves as the Ubuntu test runner AND coverage generator.
    # Coverage runs the same tests as cargo test, just with LLVM instrumentation.
    # macOS/Windows testing is handled separately in test.yml.
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      - uses: ./.github/actions/install-tools
        with:
          tools: just,cargo-llvm-cov,cargo-nextest

      - name: Run tests with coverage
        run: just test-coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # ratchet:codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive coverage artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # ratchet:actions/upload-artifact@v7.0.0
        with:
          name: coverage-report
          path: lcov.info
