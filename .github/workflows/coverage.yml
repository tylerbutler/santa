name: Code Coverage

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  coverage:
    # This job serves as the Ubuntu test runner AND coverage generator.
    # Coverage runs the same tests as cargo test, just with LLVM instrumentation.
    # macOS/Windows testing is handled separately in test.yml.
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6

      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      - uses: ./.github/actions/install-tools
        with:
          tools: just,cargo-llvm-cov,cargo-nextest

      - name: Run tests with coverage
        run: just test-coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # ratchet:codecov/codecov-action@v6.0.1
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: lcov.info
