name: Auto-tag release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # ratchet:actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install changie
        uses: miniscruff/changie-action@5036dffa79ffc007110dc7f75eca7ef72780e147 # ratchet:miniscruff/changie-action@v2.1.0

      - name: Create tags for released projects
        run: |
          CREATED_TAGS=""
          for project in santa santa-data sickle; do
            version=$(changie latest --project "$project" 2>/dev/null || true)
            if [ -z "$version" ]; then
              echo "Could not resolve version for $project, skipping"
              continue
            fi
            if git tag -l "$version" | grep -q .; then
              echo "Tag $version already exists, skipping"
              continue
            fi
            git tag "$version"
            CREATED_TAGS="${CREATED_TAGS:+$CREATED_TAGS }$version"
            echo "Created tag: $version"
          done

          if [ -n "$CREATED_TAGS" ]; then
            git push origin --tags
            echo "### Tags Created" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for tag in $CREATED_TAGS; do
              echo "- \`$tag\`" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No new tags needed"
            echo "### No New Tags" >> "$GITHUB_STEP_SUMMARY"
          fi
