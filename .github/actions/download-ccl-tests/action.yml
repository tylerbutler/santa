name: 'Download CCL Test Data'
description: 'Download ccl-test-data from GitHub releases with version tracking'

inputs:
  version:
    description: 'Release version to download (e.g. v0.6.2). Defaults to latest.'
    required: false
    default: 'latest'
  force:
    description: 'Force re-download even if already at the target version'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Download CCL test data
      uses: tylerbutler/actions/download-ccl-tests@45e41a577532a09caabd5700cfbb90ce25efda78 # ratchet:tylerbutler/actions/download-ccl-tests@main
      with:
        version: ${{ inputs.version }}
        force: ${{ inputs.force }}
        output-dir: crates/sickle/tests/test_data
